{% extends 'base.html' %}

{% block title %}Create an account - MWT{% endblock %}

{% block breadcrumbs %}
<nav aria-label="breadcrumb">
	<ol class="breadcrumb">
		<li class="breadcrumb-item"><a href="{{ url_for('home') }}" class="text-decoration-none">Home</a></li>
		<li class="breadcrumb-item active" aria-current="page">Register</li>
	</ol>
</nav>
{% endblock %}

{% block content %}
<main class="container my-5">
	<div class="row align-items-start">
		<aside class="col-md-7 col-lg-6 p-5 px-md-5 mb-5 mb-md-0 bg-white rounded-4 modern-card border-0">
			<div class="d-flex justify-content-between align-items-center pb-4">
				<h1 id="form-title" class="mb-0">Register as a guide</h1>

				<!-- Toggle switch -->
				<div class="sliding-toggle" role="group" aria-label="Toggle user type">
					<input type="radio" class="btn-check" name="user_type_toggle" id="btn-guide" checked
						onchange="toggleRegistrationForm()">
					<label class="btn sliding-label" for="btn-guide">Guide</label>

					<input type="radio" class="btn-check" name="user_type_toggle" id="btn-participant"
						onchange="toggleRegistrationForm()">
					<label class="btn sliding-label" for="btn-participant">Participant</label>

					<div class="slider"></div>
				</div>
			</div>

			<!-- Guide Form -->
			<div id="guide-form-container">
				<form action="{{ url_for('register') }}" method="POST" enctype="multipart/form-data">
					<!--Default value, used for backend managing-->
					<input type="hidden" name="role" value="guide">

					<label class="form-label" for="guide_first_name">First name</label>
					<input class="form-control" type="text" name="first_name" id="guide_first_name"
						placeholder="Enter your first name" pattern="[A-Za-z]+" minlength="2" required>
					<br>

					<label class="form-label" for="guide_last_name">Last name</label>
					<input class="form-control" type="text" name="last_name" id="guide_last_name"
						placeholder="Enter your last name" pattern="[A-Za-z]+" minlength="2" required>
					<br>

					<label class="form-label" for="guide_email">Email address</label>
					<input class="form-control" type="email" name="email" id="guide_email"
						placeholder="Enter your email address" required>
					<br>

					<label class="form-label" for="guide_password">Password</label>
					<input class="form-control" type="password" name="password" id="guide_password"
						placeholder="Create a secure password" required>
					<br>

					<label class="form-label d-block mb-2">Select every language you speak</label>
					{% for lang in languages %}
					<div class="form-check form-check-inline">
						<input class="form-check-input" type="checkbox" name="languages" id="lang_{{ lang.language }}"
							value="{{ lang.language }}">
						<label class="form-check-label" for="lang_{{ lang.language }}">{{ lang.language }}</label>
					</div>
					{% endfor %}

					<br><br>
					<label for="profile_image">Upload a profile picture</label>
					<input type="file" id="profile_image" name="profile_image" class="form-control" accept="image/*"
						required>
					<!--Accepting all supported image types-->
					<br>
					<br><br>

					<button type="submit" class="btn btn-marsala">Create account</button>
					<button type="reset" class="btn btn-outline-marsala">Clear form</button>
				</form>
			</div>

			<!-- Participant Form -->
			<div id="participant-form-container" class="d-none">
				<form action="{{ url_for('register') }}" method="POST" enctype="multipart/form-data">

					<input type="hidden" name="role" value="participant">

					<label class="form-label" for="participant_first_name">First name</label>
					<input class="form-control" type="text" name="first_name" id="participant_first_name"
						placeholder="Enter your first name" pattern="[A-Za-z]+" minlength="2" required>
					<br>

					<label class="form-label" for="participant_last_name">Last name</label>
					<input class="form-control" type="text" name="last_name" id="participant_last_name"
						placeholder="Enter your last name" pattern="[A-Za-z]+" minlength="2" required>
					<br>

					<label class="form-label" for="participant_email">Email address</label>
					<input class="form-control" type="email" name="email" id="participant_email"
						placeholder="Enter your email address" required>
					<br>

					<label class="form-label" for="participant_password">Password</label>
					<input class="form-control" type="password" name="password" id="participant_password"
						placeholder="Create a secure password" required>
					<br><br>

					<button type="submit" class="btn btn-marsala">Create account</button>
					<button type="reset" class="btn btn-outline-marsala">Clear form</button>
				</form>
			</div>
		</aside>

		<section class="col-md-5 col-lg-6">
			<div class="p-5 text-center bg-white rounded-4 modern-card border-0">
				<h2 class="fw-bold pb-4 text-marsala-primary">Already have an account?</h2>
				<a href="{{ url_for('login_page') }}" class="btn btn-outline-marsala btn-lg px-5 rounded-pill">Go to
					Login page</a>
			</div>
		</section>
	</div>
</main>
{% endblock %}
